      - name: test-cftests-nonjunit.sh
        run: (cd ../checker-framework && checker/bin-devel/test-cftests-nonjunit.sh)
  cftests_typecheck_jdk17:
    needs:
      - canary_jobs
    timeout-minutes: 120
